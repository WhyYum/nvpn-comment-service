# --- Отображение статусов, ролей, категорий ---
accountStatus:
  ACTIVE: "Активен"
  STOPPED: "Остановлен"
  SPAM_BLOCK: "Спам-блок"
  FLOOD_WAIT: "FloodWait"
  AUTH_ERROR: "Ошибка авторизации"
  BANNED: "Заблокирован"
  NEEDS_CHECK: "Требует проверки"

accountRole:
  PARSER: "Парсер"
  SENDER: "Рассыльщик"

accountCategory:
  BS: "БС"
  REGULAR: "Обычные"

postStatus:
  PENDING: "0"
  PROCESSING: "В обработке"
  SUCCESS: "1"
  ERROR: "2"

# --- Карточка аккаунта ---
accountCard: "<b>%phone%</b>\nТип: %role%\nКатегория: %category%\nСтатус: %status%\nTelegram Premium: %premium%\nОтправлено сегодня: %sentToday%\nОшибок сегодня: %errorsToday%\nПоследняя активность: %lastActivity%"

# --- Статистика ---
stats:
  format: "<b>Статистика</b>\n\nПарсеров: %parsers%\nРассыльщиков: %senders%\nPremium аккаунтов: %premiumAccounts%\nSpamBlock: %spamBlockAccounts%\n\nНайдено постов: %totalPosts%\nОжидают отправки: %pendingPosts%\nУспешно отправлено: %successPosts%\nОшибок: %errorPosts%\n\nОтправок за сутки: %sentToday%\nОтправок за неделю: %sentThisWeek%\nОтправок за месяц: %sentThisMonth%"

# --- Лимиты ---
