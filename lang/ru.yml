  format: "<b>Лимиты рассылки</b>\n\nЛимит в час: %hourlyLimit%\nЛимит в сутки: %dailyLimit%\nМин. задержка: %minDelaySeconds%с\nМакс. задержка: %maxDelaySeconds%с"
